<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zuu VPN Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #161c2d;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
            --card-border: rgba(255, 255, 255, 0.08);
            --grad: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            padding-bottom: 40px;
        }

        /* Header & Status */
        .status-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--card-border);
            margin-bottom: 16px;
        }

        .user-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .info-box {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        .label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-size: 14px; font-weight: 700; display: block; margin-top: 2px; }

        /* Map Section */
        .map-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid var(--card-border);
            margin-bottom: 16px;
        }

        #map { height: 200px; border-radius: 12px; width: 100%; }

        /* Lucky Wheel Section */
        .wheel-card {
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.1) 0%, var(--card-bg) 100%);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--accent);
            margin-bottom: 16px;
        }

        /* Platform Selector (CisVPN style) */
        .platform-selector {
            display: flex;
            background: var(--card-bg);
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
            margin-bottom: 12px;
        }

        .p-btn {
            flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-sub);
            border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .p-btn.active { background: var(--accent); color: #000; }

        /* Apps list */
        .app-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--card-border);
        }

        .app-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: #1e293b; border-radius: 8px; color: var(--accent); }
        .app-details { flex: 1; }
        .app-name { font-size: 14px; font-weight: 600; }
        .app-desc { font-size: 11px; color: var(--text-sub); }

        .btn-install {
            background: rgba(56, 189, 248, 0.1); color: var(--accent); border: none;
            padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 12px;
        }

        .btn-wheel {
            width: 100%; background: var(--grad); color: #fff; border: none;
            padding: 14px; border-radius: 14px; font-weight: 800; font-size: 15px; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .btn-wheel:disabled { background: #334155; box-shadow: none; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="status-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 18px; font-weight: 800;">Zuu <span style="color:var(--accent)">VPN</span></span>
            <span id="sub-status" style="color: var(--success); font-size: 12px; font-weight: 700;">● Подписка активна</span>
        </div>
        <div class="user-info">
            <div class="info-box"><span class="label">ID Аккаунта</span><span class="value" id="u-id">...</span></div>
            <div class="info-box"><span class="label">Баланс</span><span class="value" id="u-bal" style="color: var(--success);">0₽</span></div>
            <div class="info-box"><span class="label">Истекает</span><span class="value" id="u-exp">...</span></div>
            <div class="info-box"><span class="label">Трафик</span><span class="value">Безлимит</span></div>
        </div>
    </div>

    <div class="map-card">
        <div class="label" style="margin-bottom: 8px;"><i class="fas fa-globe"></i> Наши локации</div>
        <div id="map"></div>
    </div>

    <div class="wheel-card">
        <div style="font-weight: 800; font-size: 17px;">🎁 Lucky Wheel</div>
        <div style="font-size: 12px; color: var(--text-sub); margin-bottom: 10px;">Бонус к подписке раз в неделю</div>
        <button class="btn-wheel" id="spin-btn" onclick="startSpin()">КРУТИТЬ БОНУС</button>
        <div id="timer-text" style="font-size: 11px; margin-top: 8px; font-weight: 500;"></div>
    </div>

    <div class="label" style="margin: 0 0 10px 5px;">Установка приложения</div>
    <div class="platform-selector">
        <button class="p-btn active" onclick="setTab('android', this)"><i class="fab fa-android"></i> Android</button>
        <button class="p-btn" onclick="setTab('ios', this)"><i class="fab fa-apple"></i> iOS</button>
        <button class="p-btn" onclick="setTab('pc', this)"><i class="fas fa-desktop"></i> PC</button>
    </div>

    <div id="app-list"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        document.getElementById('u-id').innerText = params.get('id') || 'Неизвестно';
        document.getElementById('u-bal').innerText = (params.get('bal') || '0') + '₽';
        document.getElementById('u-exp').innerText = params.get('exp') || 'Нет данных';

        // 1. КАРТА (Твой полный список стран)
        function initMap() {
            const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([45, 20], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            const locations = [
                { name: "Россия 🇷🇺", coords: [55.75, 37.61] },
                { name: "Германия 🇩🇪", coords: [52.52, 13.40] },
                { name: "Нидерланды 🇳🇱", coords: [52.36, 4.88] },
                { name: "Турция 🇹🇷", coords: [39.93, 32.85] },
                { name: "США 🇺🇸", coords: [38.90, -77.03] },
                { name: "Финляндия 🇫🇮", coords: [60.16, 24.93] },
                { name: "ОАЭ 🇦🇪", coords: [25.20, 55.27] }
            ];

            locations.forEach(loc => {
                L.circleMarker(loc.coords, {
                    radius: 5, fillColor: "#38bdf8", color: "#fff", weight: 1, fillOpacity: 0.8
                }).addTo(map).bindPopup(`<b>${loc.name}</b>`);
            });
        }

        // 2. УСТАНОВКА (Проверенные ссылки)
        const apps = {
            android: [
                { name: 'v2rayNG', desc: 'Классический и стабильный', icon: 'fa-robot', link: 'https://play.google.com/store/apps/details?id=com.v2ray.ang' },
                { name: 'Hiddify Next', desc: 'Универсальный (рекомендуем)', icon: 'fa-bolt', link: 'https://play.google.com/store/apps/details?id=app.hiddify.com' },
                { name: 'ClashMeta', desc: 'Для продвинутых', icon: 'fa-shield-halved', link: 'https://github.com/MetaCubeX/ClashMetaForAndroid/releases' }
            ],
            ios: [
                { name: 'Streisand', desc: 'Бесплатный и быстрый', icon: 'fa-paper-plane', link: 'https://apps.apple.com/us/app/streisand/id6450534064' },
                { name: 'Hiddify Next', desc: 'Лучший выбор для iOS', icon: 'fa-bolt', link: 'https://apps.apple.com/us/app/hiddify-next/id6477388513' }
            ],
            pc: [
                { name: 'v2rayN', desc: 'Для Windows', icon: 'fa-desktop', link: 'https://github.com/2dust/v2rayN/releases' },
                { name: 'Hiddify Desktop', desc: 'Для Win/Mac/Linux', icon: 'fa-laptop', link: 'https://github.com/hiddify/hiddify-next/releases' },
                { name: 'Nekoray', desc: 'Для мощных ПК', icon: 'fa-microchip', link: 'https://github.com/MatsuriDayo/nekoray/releases' }
            ]
        };

        function setTab(p, el) {
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const list = document.getElementById('app-list');
            list.innerHTML = '';
            apps[p].forEach(app => {
                list.innerHTML += `
                    <div class="app-item">
                        <div class="app-icon"><i class="fas ${app.icon}"></i></div>
                        <div class="app-details">
                            <div class="app-name">${app.name}</div>
                            <div class="app-desc">${app.desc}</div>
                        </div>
                        <button class="btn-install" onclick="window.open('${app.link}', '_blank')">Скачать</button>
                    </div>
                `;
            });
        }

        // 3. РУЛЕТКА (Твой функционал)
        const lastSpin = parseFloat(params.get('ls')) || 0;
        function updateTimer() {
            const btn = document.getElementById('spin-btn');
            const timerText = document.getElementById('timer-text');
            const now = Math.floor(Date.now() / 1000);
            const timeLeft = (lastSpin + 518400) - now; // 6 дней

            if (timeLeft > 0) {
                btn.disabled = true;
                const d = Math.floor(timeLeft / 86400);
                const h = Math.floor((timeLeft % 86400) / 3600);
                timerText.innerText = `Доступно через ${d}д ${h}ч`;
            } else {
                btn.disabled = false;
                timerText.innerText = "Можно крутить!";
                timerText.style.color = "var(--success)";
            }
        }

        function startSpin() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.innerText = "КРУТИМ...";
            setTimeout(() => {
                const prizes = ["📅 +1 день подписки", "🎁 Бонус 10₽", "📅 +3 дня подписки"];
                const prize = prizes[Math.floor(Math.random()*prizes.length)];
                tg.showAlert(`Поздравляем! ${prize}`, () => {
                    tg.sendData(JSON.stringify({action: 'wheel_prize', prize: prize}));
                    tg.close();
                });
            }, 1500);
        }

        // Init
        setTab('android', document.querySelector('.p-btn'));
        updateTimer();
        setTimeout(initMap, 500);
    </script>
</body>
</html>
