<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zuu VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f5f0e5; 
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #8e8e93;
            --accent: #3b82f6;
            --danger: #ff3b30;
            --tab-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0 16px 100px 16px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .user-greeting {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
        }

        .badge {
            background: #dbeafe;
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active { opacity: 0.8; }

        .btn-outline {
            background: transparent;
            border: 1px solid #e5e7eb;
            color: var(--text-main);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: var(--tab-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            display: flex;
            justify-content: space-around;
            padding: 10px 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            flex: 1;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item.active i {
            background: #eff6ff;
            padding: 8px 16px;
            border-radius: 16px;
            margin-top: -4px;
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .promo-input {
            background: #f9fafb;
            border: 1px solid #f3f4f6;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="header">
            <div>
                <p style="margin:0; color: var(--text-sub); font-size: 14px;">Добро пожаловать,</p>
                <h1 class="user-greeting" id="u-name-display">Angel!</h1>
            </div>
            <div class="badge"><i class="fas fa-star"></i> <span id="status-text">Базовый юзер</span></div>
        </div>

        <div class="grid-2">
            <div class="card" style="margin-bottom:0">
                <div style="color: var(--text-sub); font-size: 12px; margin-bottom: 5px;">Аккаунт ID</div>
                <div style="font-weight: 800;" id="u-id">...</div>
            </div>
            <div class="card" style="margin-bottom:0">
                <div style="color: var(--text-sub); font-size: 12px; margin-bottom: 5px;">Осталось</div>
                <div style="font-weight: 800; color: var(--accent);" id="u-exp">...</div>
            </div>
        </div>

        <div class="card" style="border: 1px dashed var(--accent); background: #eff6ff;">
            <div class="card-title" style="font-size: 16px;">Быстрая настройка</div>
            <button class="btn" onclick="importToHapp()">
                <i class="fas fa-file-import"></i> ИМПОРТ В HAPP PROXY
            </button>
            <p style="font-size: 11px; color: var(--text-sub); text-align: center; margin-top: 10px;">
                Добавление конфигурации в одно нажатие
            </p>
        </div>
    </div>

    <div id="subscription" class="page">
        <h1 class="card-title" style="font-size: 28px; margin-top: 20px;">Подписка</h1>
        <div class="card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span style="font-weight: 700;">Статус:</span>
                <span id="sub-status-label" style="font-weight: 700;">...</span>
            </div>
            <div style="font-size: 14px; color: var(--text-sub); margin-bottom: 10px;">Ваша ссылка для подключения:</div>
            <input class="promo-input" readonly value="..." id="sub-link-input">
            <button class="btn btn-outline" onclick="copySub()">Копировать ссылку</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="showPage('home', this)">
            <i class="fas fa-home"></i>
            Главная
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('subscription', this)">
            <i class="fas fa-wand-magic-sparkles"></i>
            Подписка
        </a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Парсинг данных из URL (твоя рабочая логика)
        const params = new URLSearchParams(window.location.search);
        const userExp = params.get('exp');
        const encryptedLink = params.get('enc_link');
        const userId = params.get('id') || 'Неизвестно';
        const userName = tg.initDataUnsafe.user?.first_name || "Angel";

        // Заполнение интерфейса
        document.getElementById('u-name-display').innerText = userName + '!';
        document.getElementById('u-id').innerText = userId;
        document.getElementById('u-exp').innerText = userExp || 'Нет активной';
        document.getElementById('sub-link-input').value = encryptedLink || 'Ссылка не найдена';

        // Логика статуса
        const statusText = document.getElementById('status-text');
        const statusLabel = document.getElementById('sub-status-label');
        if (!userExp || userExp === 'Нет активной') {
            statusText.innerText = "Не активен";
            statusLabel.innerText = "Не активна";
            statusLabel.style.color = "var(--danger)";
        } else {
            statusText.innerText = "Premium";
            statusLabel.innerText = "Активна";
            statusLabel.style.color = "#10b981";
        }

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        // Твоя логика импорта: happ://add/ + ссылка
        function importToHapp() {
            if (!encryptedLink || userExp === 'Нет активной') {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("⚠️ Сначала приобретите подписку!");
                return;
            }

            let finalUrl = encryptedLink;
            if (!finalUrl.startsWith('happ://')) {
                finalUrl = `happ://add/${finalUrl}`;
            }

            tg.HapticFeedback.notificationOccurred('success');
            tg.openLink(finalUrl);
        }

        function copySub() {
            const linkInput = document.getElementById('sub-link-input');
            if (linkInput.value === 'Ссылка не найдена') return;
            
            navigator.clipboard.writeText(linkInput.value).then(() => {
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Ссылка скопирована!");
            });
        }

        tg.setHeaderColor('#f5f0e5');
        tg.setBackgroundColor('#f5f0e5');
    </script>
</body>
</html>
