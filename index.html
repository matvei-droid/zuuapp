(function() {
    const currentUrl = new URL(window.location.href);
    // Если в ссылке нет параметра 'v', добавляем его и перезагружаем страницу
    // Это заставит Telegram и браузер обновить кэш
    if (!currentUrl.searchParams.get('v')) {
        currentUrl.searchParams.set('v', Date.now()); // Добавляем метку времени
        window.location.replace(currentUrl.toString());
    }
})();

const userExp = params.get('exp');     // Дата подписки
const lastSpin = parseFloat(params.get('ls')) || 0;
const cooldownSeconds = 518400;

}


function importToHapp() {
    // 1. Проверяем текст в поле подписки
    const expDate = document.getElementById('u-exp').innerText;
    
    // Если там пусто, точки или написано "Нет активной"
    if (!userToken || expDate === 'Нет активной' || expDate === '...' || expDate === '') {
        tg.HapticFeedback.notificationOccurred('error'); // Вибрация ошибки
        tg.showAlert("⚠️ Сначала купите подписку в боте, чтобы получить настройки VPN!");
        return; // Прекращаем выполнение
    }
    
    // 2. Если подписка есть — погнали импортировать
    const configUrl = `https://zuuvpn.space/get_vpn?token=${userToken}`;
    const happUrl = `happ://add/${configUrl}`;
    
    tg.HapticFeedback.notificationOccurred('success');

    // Открываем ссылку
    const externalLink = document.createElement('a');
    externalLink.href = happUrl;
    externalLink.target = '_blank';
    externalLink.click();

    setTimeout(() => {
        tg.openLink(happUrl, { try_instant_view: false });
    }, 100);
}

        function updateTimer() {
            const btn = document.getElementById('spin-btn');
            const timerText = document.getElementById('timer-text');
            const now = Math.floor(Date.now() / 1000);
            const timeLeft = (lastSpin + cooldownSeconds) - now;

            if (timeLeft > 0) {
                btn.disabled = true;
                const d = Math.floor(timeLeft / 86400);
                const h = Math.floor((timeLeft % 86400) / 3600);
                btn.innerText = `БЛОКИРОВКА (${d}Д ${h}Ч)`;
                timerText.innerHTML = `<i class="fas fa-lock"></i> Доступно через ${d}д ${h}ч`;
                return true;
            } else {
                btn.disabled = false;
                btn.innerText = "ПОЛУЧИТЬ БОНУС";
                timerText.style.color = "var(--success)";
                timerText.innerHTML = `<i class="fas fa-check-circle"></i> Можно крутить!`;
                return false;
            }
        }

        function startSpin() {
            if (updateTimer()) return;
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.innerText = "КРУТИМ...";

                const rand = Math.random() * 100;

                tg.showAlert(msg, () => {

function renderApps(platform) {

    appData[platform].forEach(app => {

// Функция переключения табов
function switchDevice(platform, btn) {
    // Убираем активный класс у всех кнопок
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    // Добавляем нажатой кнопке
    btn.classList.add('active');
    // Обновляем список приложений
    renderApps(platform);
}

        async function runSpeedTest() {
            const btn = document.getElementById('test-btn');
            const speedText = document.getElementById('speed-mbps');
            const progressBar = document.getElementById('speed-progress');
            
            btn.disabled = true;
            btn.innerText = "ЗАМЕРЯЕМ...";
            speedText.innerText = "0.0";
            progressBar.style.width = "0%";

            // Ссылка на тестовый файл (картинка 5МБ для теста). 
            // В идеале замените на файл на вашем сервере VPN для точности
            const testFile = "https://upload.wikimedia.org/wikipedia/commons/3/3a/Russia_Relief_Location_map.jpg?cache=" + Math.random();
            const fileSize = 5 * 1024 * 1024 * 8; // Примерный размер в битах

            const startTime = new Date().getTime();
            
            try {
                const response = await fetch(testFile);
                const reader = response.body.getReader();
                let loaded = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    loaded += value.length;
                    const percent = (loaded / (5 * 1024 * 1024)) * 100;
                    progressBar.style.width = Math.min(percent, 100) + "%";
                }

                const endTime = new Date().getTime();
                const duration = (endTime - startTime) / 1000;
                const speedMbps = (fileSize / duration / 1000000).toFixed(1);

                speedText.innerText = speedMbps;
                btn.innerText = "ПОВТОРИТЬ ТЕСТ";
            } catch (e) {
                tg.showAlert("Ошибка теста. Проверьте соединение.");
                btn.innerText = "ОШИБКА";
            } finally {
                btn.disabled = false;
            }
        }

    </script>
</body>
</html>
