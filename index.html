<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zuu VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
            --card-border: rgba(255, 255, 255, 0.08);
            --grad: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
        }

        body.light-mode {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent: #0284c7;
            --card-border: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .brand h2 {
            margin: 0;
            font-size: 24px;
            letter-spacing: -0.5px;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--card-border);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.2);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--card-border);
        }

        .info-row:last-child { border-bottom: none; }
        .label { color: var(--text-sub); font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .value { font-weight: 700; font-size: 15px; }

        .map-container {
            height: 200px;
            width: 100%;
            border-radius: 16px;
            margin-top: 15px;
            border: 1px solid var(--card-border);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-primary { 
            background: var(--grad); 
            color: #ffffff; 
            box-shadow: 0 8px 20px -6px rgba(56, 189, 248, 0.5);
        }

        .btn:active { transform: scale(0.98); }

        .btn:disabled {
            background: #475569 !important;
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--accent);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wheel-box {
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.05) 0%, rgba(56, 189, 248, 0) 100%);
            text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .wheel-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
        .wheel-desc { color: var(--text-sub); font-size: 13px; margin-bottom: 20px; }
        #timer-text { font-size: 12px; margin-top: 12px; font-weight: 500; }
        
        .leaflet-container { background: transparent !important; }
        /* КРАСИВЫЙ БЛОК УСТАНОВКИ */
.section-title {
    font-size: 18px;
    font-weight: 800;
    margin: 30px 0 15px 5px;
    letter-spacing: -0.5px;
}

.device-tabs {
    display: flex;
    background: var(--card-bg);
    padding: 6px;
    border-radius: 18px;
    gap: 6px;
    margin-bottom: 20px;
    border: 1px solid var(--card-border);
    backdrop-filter: blur(10px);
}

.tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    color: var(--text-sub);
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.tab-btn.active {
    background: var(--grad);
    color: #fff;
    box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
}

.app-card {
    display: flex;
    align-items: center;
    gap: 15px;
    background: var(--card-bg);
    padding: 16px;
    border-radius: 24px;
    border: 1px solid var(--card-border);
    margin-bottom: 12px;
    transition: transform 0.2s;
}

.app-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, rgba(14, 165, 233, 0.1) 100%);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 22px;
    border: 1px solid rgba(56, 189, 248, 0.2);
}

.app-name { font-weight: 800; font-size: 15px; margin-bottom: 2px; }
.app-ver { font-size: 12px; color: var(--text-sub); font-weight: 500; }

.dl-link {
    background: var(--grad);
    color: #fff;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 800;
    box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
    transition: all 0.2s;
    border: none;
}

.dl-link:active {
    transform: scale(0.95);
    box-shadow: none;
}

.support-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(56, 189, 248, 0.05);
    border: 2px dashed rgba(56, 189, 248, 0.3);
    padding: 18px;
    border-radius: 24px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 800;
    margin-top: 25px;
    transition: all 0.2s;
}

.support-btn:active {
    background: rgba(56, 189, 248, 0.1);
}

    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <h2>Zuu VPN Premium</h2>
            <div class="status-pill">
                <i class="fas fa-shield-alt"></i> Защищенное соединение
            </div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon" id="theme-icon"></i>
        </button>
    </div>

    <div class="card">
        <div class="info-row">
            <span class="label"><i class="fas fa-user-circle"></i> Аккаунт ID</span>
            <span class="value" id="u-id">...</span>
        </div>
        <div class="info-row">
            <span class="label"><i class="fas fa-credit-card"></i> Баланс</span>
            <span class="value" id="u-bal" style="color: var(--success);">0₽</span>
        </div>
        <div class="info-row">
            <span class="label"><i class="fas fa-clock"></i> Подписка до</span>
            <span class="value" id="u-exp">...</span>
        </div>
    </div>

    <div class="card">
        <div class="wheel-title" style="text-align: left;">
            <i class="fas fa-map-marker-alt" style="color: var(--accent);"></i> Наши сервера
        </div>
        <div id="map" class="map-container"></div>
    </div>

    <div class="card wheel-box">
        <div class="wheel-title">🎁 Lucky Wheel</div>
        <div class="wheel-desc">Получи бонус к подписке раз в неделю</div>
        
        <button class="btn btn-primary" id="spin-btn" onclick="startSpin()">
            КРУТИТЬ БОНУС
        </button>
        <div id="timer-text">Загрузка...</div>
    </div>
        <div class="section-title">Установка приложений</div>

<div class="device-tabs">
    <button class="tab-btn active" onclick="switchDevice('android', this)">Android</button>
    <button class="tab-btn" onclick="switchDevice('ios', this)">iOS</button>
    <button class="tab-btn" onclick="switchDevice('pc', this)">Desktop</button>
</div>

<div id="app-list">
    </div>

<a href="https://t.me/zuufeedback_bot" target="_blank" class="support-btn">
    <i class="fas fa-headset"></i> Поддержка: @zuufeedback_bot
</a>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const params = new URLSearchParams(window.location.search);
        const lastSpin = parseFloat(params.get('ls')) || 0;
        const cooldownSeconds = 518400; // 6 дней

        document.getElementById('u-id').innerText = params.get('id') || 'Неизвестно';
        document.getElementById('u-bal').innerText = (params.get('bal') || '0') + '₽';
        document.getElementById('u-exp').innerText = params.get('exp') || 'Нет активной';

        let map;
        function initMap() {
            // Список локаций обновлен в соответствии с вашими серверами
            const locations = [
                { name: "Россия 🇷🇺", coords: [55.75, 37.61] },
                { name: "Германия 🇩🇪", coords: [52.52, 13.40] },
                { name: "Финляндия 🇫🇮", coords: [60.16, 24.93] },
                { name: "Польша 🇵🇱", coords: [52.23, 21.01] },
                { name: "Нидерланды 🇳🇱", coords: [52.36, 4.88] },
                { name: "Швеция 🇸🇪", coords: [59.32, 18.06] },
                { name: "Австрия 🇦🇹", coords: [48.20, 16.37] },
                { name: "Латвия 🇱🇻", coords: [56.94, 24.10] },
                { name: "Литва 🇱🇹", coords: [54.68, 25.27] },
                { name: "Великобритания 🇬🇧", coords: [51.50, -0.12] },
                { name: "Франция 🇫🇷", coords: [48.85, 2.35] },
                { name: "Швейцария 🇨🇭", coords: [46.94, 7.44] },
                { name: "Чехия 🇨🇿", coords: [50.07, 14.43] },
                { name: "Испания 🇪🇸", coords: [40.41, -3.70] },
                { name: "Турция 🇹🇷", coords: [39.93, 32.85] },
                { name: "ОАЭ 🇦🇪", coords: [25.20, 55.27] },
                { name: "Казахстан 🇰🇿", coords: [51.16, 71.47] },
                { name: "США 🇺🇸", coords: [38.90, -77.03] },
                { name: "Канада 🇨🇦", coords: [45.42, -75.69] },
                { name: "Израиль 🇮🇱", coords: [31.76, 35.21] },
                { name: "Индия 🇮🇳", coords: [28.61, 77.20] },
                { name: "Бразилия 🇧🇷", coords: [-15.79, -47.88] },
                { name: "Корея 🇰🇷", coords: [37.56, 126.97] },
                { name: "Япония 🇯🇵", coords: [35.67, 139.65] },
                { name: "Австралия 🇦🇺", coords: [-35.28, 149.13] }
            ];

            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([45, 25], 2);
            
            const isLight = document.body.classList.contains('light-mode');
            const tileStyle = isLight ? 'light_all' : 'dark_all';
            
            L.tileLayer(`https://{s}.basemaps.cartocdn.com/${tileStyle}/{z}/{x}/{y}{r}.png`).addTo(map);

            const dotIcon = L.divIcon({
                className: 'map-dot',
                html: `<div style="background:#38bdf8;width:8px;height:8px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px #38bdf8;"></div>`,
                iconSize: [12, 12]
            });

            locations.forEach(loc => {
                L.marker(loc.coords, { icon: dotIcon }).addTo(map).bindPopup(`<b>${loc.name}</b>`);
            });
        }

        function updateTimer() {
            const btn = document.getElementById('spin-btn');
            const timerText = document.getElementById('timer-text');
            const now = Math.floor(Date.now() / 1000);
            const timeLeft = (lastSpin + cooldownSeconds) - now;

            if (timeLeft > 0) {
                btn.disabled = true;
                const d = Math.floor(timeLeft / 86400);
                const h = Math.floor((timeLeft % 86400) / 3600);
                btn.innerText = `БЛОКИРОВКА (${d}Д ${h}Ч)`;
                timerText.innerHTML = `<i class="fas fa-lock"></i> Доступно через ${d}д ${h}ч`;
                return true;
            } else {
                btn.disabled = false;
                btn.innerText = "ПОЛУЧИТЬ БОНУС";
                timerText.style.color = "var(--success)";
                timerText.innerHTML = `<i class="fas fa-check-circle"></i> Можно крутить!`;
                return false;
            }
        }

        function startSpin() {
            if (updateTimer()) return;
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.innerText = "КРУТИМ...";

            setTimeout(() => {
                const rand = Math.random() * 100;
                let prize = { action: 'wheel_prize', type: 'nothing' };
                let msg = "😢 Попробуйте в следующий раз!";

                if (rand < 15) {
                    prize = { action: 'wheel_prize', type: 'money', amount: 10 };
                    msg = "🎁 Вы выиграли 10₽!";
                } else if (rand < 30) {
                    prize = { action: 'wheel_prize', type: 'sub' };
                    msg = "📅 +1 день к подписке!";
                }

                tg.showAlert(msg, () => {
                    tg.sendData(JSON.stringify(prize));
                    tg.close();
                });
            }, 1500);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            const isLight = document.body.classList.contains('light-mode');
            icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            tg.setHeaderColor(isLight ? '#f8fafc' : '#0f172a');
            
            if (map) {
                map.remove();
                initMap();
            }
        }

        updateTimer();
        setTimeout(initMap, 200);
        if (tg.colorScheme === 'light') toggleTheme();
        const appData = {
    android: [
        { name: 'v2rayTun', ver: 'v1.5.8 (Google Play)', icon: 'fa-robot', link: 'https://play.google.com/store/apps/details?id=com.v2raytun.android' },
        { name: 'Happ', ver: 'v2.0.1 (Google play)', icon: 'fa-bolt', link: 'https://play.google.com/store/apps/details?id=com.happproxy' }
    ],
    ios: [
        { name: 'Happ Proxy', ver: 'v1.0.2 (App Store)', icon: 'fa-apple', link: 'https://apps.apple.com/us/app/happ-proxy-utility/id6504287215' },
        { name: 'Streisand', ver: 'v1.4.0 (App Store)', icon: 'fa-paper-plane', link: 'https://apps.apple.com/app/streisand/id6450534064' }
    ],
    pc: [
        { name: 'v2rayN', ver: 'Windows (GitHub)', icon: 'fa-desktop', link: 'https://github.com/2dust/v2rayN/releases' }
    ]
};

function switchDevice(device, el) {
    // Делаем кнопку активной
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');

    // Отрисовываем список
    const container = document.getElementById('app-list');
    container.innerHTML = '';

    appData[device].forEach(app => {
        container.innerHTML += `
            <div class="app-card">
                <div class="app-icon"><i class="fas ${app.icon}"></i></div>
                <div class="app-info">
                    <div class="app-name">${app.name}</div>
                    <div class="app-ver">${app.ver}</div>
                </div>
                <a href="${app.link}" target="_blank" class="dl-link">Скачать</a>
            </div>
        `;
    });
}

// Запускаем Android по умолчанию
switchDevice('android', document.querySelector('.tab-btn'));
    </script>
</body>
</html>
