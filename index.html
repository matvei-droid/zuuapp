<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zuu VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root {
            --bg: #0b0f17; --card: #161b26; --accent: #38bdf8;
            --text: #ffffff; --sub: #94a3b8; --brd: rgba(255, 255, 255, 0.05);
            --green: #10b981; --red: #ef4444;
        }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px; overflow-x: hidden; }
        
        /* HEADER */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .brand { font-weight: 800; font-size: 22px; color: var(--accent); }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn { width: 42px; height: 42px; background: var(--card); border: 1px solid var(--brd); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--sub); cursor: pointer; }
        .p-only { display: none; } /* Скрыто для тех, у кого нет подписки */

        /* USER PANEL */
        .user-panel { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--brd); margin-bottom: 20px; }
        .u-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--red); color: var(--red); font-size: 20px; transition: 0.3s; }
        .avatar.active { border-color: var(--green); color: var(--green); }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-c { background: #1f2633; border-radius: 16px; padding: 12px; border: 1px solid var(--brd); }
        .stat-l { color: var(--sub); font-size: 11px; margin-bottom: 4px; }
        .stat-v { font-weight: 700; font-size: 13px; }

        /* MAP */
        .map-box { height: 220px; border-radius: 24px; overflow: hidden; border: 1px solid var(--brd); margin: 15px 0; position: relative; }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* WHEEL */
        .wheel-btn { width: 100%; padding: 18px; border-radius: 18px; font-weight: 800; border: none; background: #232a35; color: var(--sub); cursor: not-allowed; transition: 0.3s; }
        .wheel-btn.ready { background: var(--accent); color: #000; cursor: pointer; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        /* TABS & APPS */
        .dev-tabs { display: flex; background: var(--card); padding: 4px; border-radius: 14px; gap: 4px; margin: 20px 0 12px; border: 1px solid var(--brd); }
        .d-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--sub); border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .d-btn.active { background: var(--accent); color: #000; }
        
        .app-card { background: var(--card); border-radius: 20px; padding: 16px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--brd); margin-bottom: 10px; }
        .app-ico { width: 44px; height: 44px; background: #1f2633; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 20px; }
        .dl-btn { background: rgba(56, 189, 248, 0.1); color: var(--accent); border: none; padding: 8px 12px; border-radius: 10px; font-weight: 700; font-size: 12px; cursor: pointer; }

        /* LANGUAGES */
        .langs { display: flex; justify-content: center; gap: 20px; margin-top: 30px; padding: 20px 0; border-top: 1px solid var(--brd); font-size: 13px; color: var(--sub); }
        .lang-item { display: flex; align-items: center; gap: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">Zuu VPN</div>
        <div class="top-actions">
            <div class="icon-btn p-only" id="q-btn" onclick="tg.sendData('open_qr')"><i class="fas fa-qrcode"></i></div>
            <div class="icon-btn p-only" id="c-btn" onclick="copyMe()"><i class="fas fa-link"></i></div>
            <div class="icon-btn" onclick="window.open('https://t.me/zuufeedback_bot')"><i class="fas fa-headset"></i></div>
        </div>
    </div>

    <div class="user-panel">
        <div class="u-header">
            <div class="avatar" id="ava"><i id="ava-i" class="fas fa-power-off"></i></div>
            <div>
                <div id="name" style="font-weight: 800; font-size: 18px;">Загрузка...</div>
                <div id="sub-st" style="font-size: 12px; font-weight: 600;">Проверка...</div>
            </div>
        </div>
        <div class="stats">
            <div class="stat-c"><div class="stat-l">ID</div><div class="stat-v" id="id">...</div></div>
            <div class="stat-c"><div class="stat-l">Баланс</div><div class="stat-v" id="bal" style="color:var(--green)">0₽</div></div>
            <div class="stat-c"><div class="stat-l">Истекает</div><div class="stat-v" id="exp">...</div></div>
            <div class="stat-c"><div class="stat-l">Трафик</div><div class="stat-v">Unlimited</div></div>
        </div>
    </div>

    <div style="font-weight: 800; padding-left: 5px; margin-bottom: 10px;">Наши сервера (25 локаций)</div>
    <div class="map-box"><div id="map"></div></div>

    <div class="user-panel" style="text-align: center; border: 1px solid var(--accent);">
        <div style="font-weight: 800; margin-bottom: 5px;">Lucky Wheel</div>
        <div style="font-size: 11px; color: var(--sub); margin-bottom: 12px;">Шанс на баланс или продление подписки</div>
        <button id="spin" class="wheel-btn">БЛОКИРОВКА</button>
        <div id="spin-t" style="font-size: 11px; margin-top: 10px; color: var(--sub);">Доступно раз в неделю</div>
    </div>

    <div class="dev-tabs">
        <button class="d-btn active" onclick="setT('and', this)">Android</button>
        <button class="d-btn" onclick="setT('ios', this)">iOS</button>
        <button class="d-btn" onclick="setT('pc', this)">Desktop</button>
    </div>
    <div id="apps"></div>

    <div class="langs">
        <div class="lang-item">🇷🇺 Русский</div>
        <div class="lang-item">🇺🇸 English</div>
        <div class="lang-item">🇨🇳 中文</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const urlP = new URLSearchParams(window.location.search);
        
        // ЛОГИКА ПРОВЕРКИ ПОДПИСКИ
        const expVal = urlP.get('exp');
        const isActive = expVal && expVal !== 'Нет' && expVal !== 'null';

        document.getElementById('name').innerText = 'ID: ' + (urlP.get('id') || 'Гость');
        document.getElementById('id').innerText = urlP.get('id') || '...';
        document.getElementById('bal').innerText = (urlP.get('bal') || '0') + '₽';
        document.getElementById('exp').innerText = expVal || 'Не активна';

        if(isActive) {
            document.querySelectorAll('.p-only').forEach(e => e.style.display='flex');
            document.getElementById('ava').classList.add('active');
            document.getElementById('ava-i').className = 'fas fa-shield-check';
            document.getElementById('sub-st').innerText = 'Подписка активна';
            document.getElementById('sub-st').style.color = 'var(--green)';
        } else {
            document.getElementById('sub-st').innerText = 'Подписка неактивна';
            document.getElementById('sub-st').style.color = 'var(--red)';
        }

        function copyMe() {
            navigator.clipboard.writeText(window.location.href);
            tg.showAlert("Ваша персональная ссылка скопирована в буфер!");
        }

        // КАРТА: ВСЕ 25 ЛОКАЦИЙ
        function initMap() {
            const m = L.map('map', {zoomControl: false, attributionControl: false}).setView([30, 10], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(m);
            const locs = [
                {n:"Россия 🇷🇺",c:[55.7,37.6]},{n:"Германия 🇩🇪",c:[52.5,13.4]},{n:"Финляндия 🇫🇮",c:[60.1,24.9]},{n:"Польша 🇵🇱",c:[52.2,21]},{n:"Нидерланды 🇳🇱",c:[52.3,4.8]},
                {n:"Швеция 🇸🇪",c:[59.3,18]},{n:"Австрия 🇦🇹",c:[48.2,16.3]},{n:"Латвия 🇱🇻",c:[56.9,24.1]},{n:"Литва 🇱🇹",c:[54.6,25.2]},{n:"Великобритания 🇬🇧",c:[51.5,-0.1]},
                {n:"Франция 🇫🇷",c:[48.8,2.3]},{n:"Швейцария 🇨🇭",c:[46.9,7.4]},{n:"Чехия 🇨🇿",c:[50,14.4]},{n:"Испания 🇪🇸",c:[40.4,-3.7]},{n:"Турция 🇹🇷",c:[39.9,32.8]},
                {n:"ОАЭ 🇦🇪",c:[25.2,55.2]},{n:"Казахстан 🇰🇿",c:[51.1,71.4]},{n:"США 🇺🇸",c:[38.9,-77]},{n:"Канада 🇨🇦",c:[45.4,-75.6]},{n:"Израиль 🇮🇱",c:[31.7,35.2]},
                {n:"Индия 🇮🇳",c:[28.6,77.2]},{n:"Бразилия 🇧🇷",c:[-15.7,-47.8]},{n:"Корея 🇰🇷",c:[37.5,126.9]},{n:"Япония 🇯🇵",c:[35.6,139.6]},{n:"Австралия 🇦🇺",c:[-35.2,149.1]}
            ];
            locs.forEach(l => {
                L.circleMarker(l.c, {radius:5, fillColor: "#38bdf8", color: "#fff", weight: 1, fillOpacity: 0.8}).addTo(m).bindPopup(`<b>${l.n}</b>`);
            });
        }

        // РУЛЕТКА: ПОЛНАЯ ЛОГИКА С КД И ПРИЗАМИ
        const lastSpin = parseFloat(urlP.get('ls')) || 0;
        function updWheel() {
            const b = document.getElementById('spin');
            const now = Math.floor(Date.now()/1000);
            const diff = (lastSpin + 518400) - now; // 6 дней КД
            if(diff > 0) {
                const d = Math.floor(diff/86400); const h = Math.floor((diff%86400)/3600);
                b.innerText = `БЛОКИРОВКА (${d}Д ${h}Ч)`;
            } else {
                b.classList.add('ready'); b.innerText = 'КРУТИТЬ БОНУС';
                b.onclick = () => {
                    const r = Math.random()*100;
                    let m = "😢 Сегодня без приза, попробуйте через неделю!";
                    let res = {action: 'spin_fail'};
                    if(r < 15) { 
                        m = "🎁 Поздравляем! Вы выиграли 10₽ на баланс!"; 
                        res = {action: 'wheel_prize', type: 'money', val: 10};
                    } else if(r < 30) { 
                        m = "📅 Удача! +1 день к вашей подписке!"; 
                        res = {action: 'wheel_prize', type: 'sub', val: 1};
                    }
                    tg.showAlert(m, () => {
                        tg.sendData(JSON.stringify(res));
                        tg.close();
                    });
                };
            }
        }

        // ПРИЛОЖЕНИЯ: ССЫЛКИ И ТАБЫ
        const data = {
            and: [{n:'v2rayTun', v:'v1.5.8 • Google Play', i:'fa-robot', l:'https://play.google.com/store/apps/details?id=com.v2raytun.android'}],
            ios: [{n:'Happ Proxy', v:'v1.0.2 • App Store', i:'fa-apple', l:'https://apps.apple.com/us/app/happ-proxy-utility/id6504287215'}],
            pc: [{n:'v2rayN', v:'Windows v6.33', i:'fa-desktop', l:'https://github.com/2dust/v2rayN/releases'}]
        };

        function setT(k, el) {
            document.querySelectorAll('.d-btn').forEach(b => b.classList.remove('active')); el.classList.add('active');
            const c = document.getElementById('apps'); c.innerHTML = '';
            data[k].forEach(a => {
                c.innerHTML += `
                <div class="app-card">
                    <div class="app-ico"><i class="fas ${a.i}"></i></div>
                    <div style="flex:1"><div style="font-weight:700">${a.n}</div><div style="font-size:11px;color:var(--sub)">${a.v}</div></div>
                    <button class="dl-btn" onclick="window.open('${a.l}')">Скачать</button>
                </div>`;
            });
            c.innerHTML += `<button onclick="tg.sendData('get_config')" style="width:100%; padding:18px; border-radius:18px; border:none; background:rgba(56,189,248,0.1); color:var(--accent); font-weight:800; margin-top:10px; cursor:pointer;">ПОДКЛЮЧИТЬ ПОДПИСКУ</button>`;
        }

        // ЗАПУСК
        setT('and', document.querySelector('.d-btn')); 
        initMap(); 
        updWheel();
    </script>
</body>
</html>
