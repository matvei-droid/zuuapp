<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zuu VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');

        :root {
            --bg-color: #0b0f17;
            --card-bg: #161b26;
            --accent: #38bdf8;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
            --red: #ff4d4d;
            --green: #10b981;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            padding-bottom: 50px;
        }

        /* CISVPN USER PANEL */
        .user-panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .user-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .user-avatar { 
            width: 48px; height: 48px; background: #1f2633; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid var(--red); color: var(--red); font-size: 20px;
        }
        .user-name { font-weight: 800; font-size: 18px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: #1f2633; border-radius: 16px; padding: 12px; border: 1px solid var(--border); }
        .stat-label { color: var(--text-sub); font-size: 11px; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
        .stat-value { font-weight: 700; font-size: 14px; }

        /* MAP */
        .map-box { 
            height: 220px; border-radius: 20px; border: 1px solid var(--border); 
            margin-bottom: 20px; overflow: hidden;
        }
        #map { height: 100%; width: 100%; }

        /* WHEEL (Your Logic) */
        .wheel-card {
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.1) 0%, var(--card-bg) 100%);
            border-radius: 24px; padding: 20px; text-align: center; border: 1px solid var(--accent); margin-bottom: 25px;
        }
        .btn-wheel {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 16px; border-radius: 16px; font-weight: 800; font-size: 16px; margin-top: 15px;
        }

        /* INSTALLATION (CisVPN Tab Style) */
        .section-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; }
        
        .tab-scroller { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .tab-scroller::-webkit-scrollbar { display: none; }
        
        .app-tab { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 20px; color: var(--text-sub); font-weight: 700; white-space: nowrap;
        }
        .app-tab.active { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); color: var(--accent); }

        .install-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 20px;
        }
        .btn-action {
            width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px;
        }
        .btn-grey { background: #232a35; color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.2); }
        .btn-blue { background: rgba(56, 189, 248, 0.1); color: var(--accent); }

        .leaflet-container { background: #0b0f17 !important; }
    </style>
</head>
<body>

    <div class="user-panel">
        <div class="user-header">
            <div class="user-avatar"><i class="fas fa-times"></i></div>
            <div>
                <div class="user-name" id="u-name">user_loading...</div>
                <div style="font-size: 12px; color: var(--text-sub);">Статус: <span id="status-text" style="color: var(--red);">Неактивна</span></div>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label"><i class="fas fa-id-badge"></i> ID</div>
                <div class="stat-value" id="u-id">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label"><i class="fas fa-wallet"></i> Баланс</div>
                <div class="stat-value" id="u-bal" style="color:var(--green)">0₽</div>
            </div>
            <div class="stat-card">
                <div class="stat-label"><i class="fas fa-calendar"></i> Истекает</div>
                <div class="stat-value" id="u-exp">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label"><i class="fas fa-database"></i> Трафик</div>
                <div class="stat-value">∞</div>
            </div>
        </div>
    </div>

    <div class="section-title">Наши сервера</div>
    <div class="map-box"><div id="map"></div></div>

    <div class="wheel-card">
        <div style="font-weight: 800; font-size: 18px;">🎁 Lucky Wheel</div>
        <div style="font-size: 13px; color: var(--text-sub); margin-top: 5px;">Бонус к подписке раз в неделю</div>
        <button class="btn-wheel" id="spin-btn" onclick="startSpin()">КРУТИТЬ БОНУС</button>
        <div id="timer-text" style="font-size: 12px; margin-top: 10px; color: var(--text-sub);"></div>
    </div>

    <div class="section-title">Установка</div>
    <div class="tab-scroller">
        <div class="app-tab active" onclick="setApp('v2ray', this)">v2rayNG</div>
        <div class="app-tab" onclick="setApp('happ', this)">Happ</div>
        <div class="app-tab" onclick="setApp('clash', this)">Clash Meta</div>
        <div class="app-tab" onclick="setApp('ios', this)">iOS (Shadow)</div>
    </div>

    <div id="app-details" class="install-card">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        document.getElementById('u-name').innerText = params.get('id') ? 'ID: ' + params.get('id') : 'Пользователь';
        document.getElementById('u-id').innerText = params.get('id') || '...';
        document.getElementById('u-bal').innerText = (params.get('bal') || '0') + '₽';
        document.getElementById('u-exp').innerText = params.get('exp') || 'Не активна';

        // 1. MAP (ALL 25 LOCATIONS)
        function initMap() {
            const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([40, 20], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            const locations = [
                { name: "Россия 🇷🇺", coords: [55.75, 37.61] },
                { name: "Германия 🇩🇪", coords: [52.52, 13.40] },
                { name: "Финляндия 🇫🇮", coords: [60.16, 24.93] },
                { name: "Польша 🇵🇱", coords: [52.23, 21.01] },
                { name: "Нидерланды 🇳🇱", coords: [52.36, 4.88] },
                { name: "Швеция 🇸🇪", coords: [59.32, 18.06] },
                { name: "Австрия 🇦🇹", coords: [48.20, 16.37] },
                { name: "Латвия 🇱🇻", coords: [56.94, 24.10] },
                { name: "Литва 🇱🇹", coords: [54.68, 25.27] },
                { name: "Великобритания 🇬🇧", coords: [51.50, -0.12] },
                { name: "Франция 🇫🇷", coords: [48.85, 2.35] },
                { name: "Швейцария 🇨🇭", coords: [46.94, 7.44] },
                { name: "Чехия 🇨🇿", coords: [50.07, 14.43] },
                { name: "Испания 🇪🇸", coords: [40.41, -3.70] },
                { name: "Турция 🇹🇷", coords: [39.93, 32.85] },
                { name: "ОАЭ 🇦🇪", coords: [25.20, 55.27] },
                { name: "Казахстан 🇰🇿", coords: [51.16, 71.47] },
                { name: "США 🇺🇸", coords: [38.90, -77.03] },
                { name: "Канада 🇨🇦", coords: [45.42, -75.69] },
                { name: "Израиль 🇮🇱", coords: [31.76, 35.21] },
                { name: "Индия 🇮🇳", coords: [28.61, 77.20] },
                { name: "Бразилия 🇧🇷", coords: [-15.79, -47.88] },
                { name: "Корея 🇰🇷", coords: [37.56, 126.97] },
                { name: "Япония 🇯🇵", coords: [35.67, 139.65] },
                { name: "Австралия 🇦🇺", coords: [-35.28, 149.13] }
            ];

            const dot = L.divIcon({
                className: 'custom-dot',
                html: `<div style="background:var(--accent); width:8px; height:8px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 10px var(--accent);"></div>`
            });

            locations.forEach(loc => {
                L.marker(loc.coords, { icon: dot }).addTo(map).bindPopup(`<b>${loc.name}</b>`);
            });
        }

        // 2. APPS DATA
        const apps = {
            v2ray: { 
                title: 'Установка v2rayNG', 
                desc: 'Популярный клиент для Android. Поддерживает все современные протоколы.',
                main: 'Google Play', link1: 'https://play.google.com/store/apps/details?id=com.v2ray.ang',
                sec: 'Скачать APK', link2: 'https://github.com/2dust/v2rayNG/releases/latest/download/v2rayNG_arm64-v8a.apk'
            },
            happ: { 
                title: 'Установка Happ', 
                desc: 'Быстрый и современный клиент на базе Hiddify.',
                main: 'Скачать с GitHub', link1: 'https://github.com/hiddify/hiddify-next/releases',
                sec: 'Google Play', link2: 'https://play.google.com/store/apps/details?id=app.hiddify.com'
            },
            clash: { 
                title: 'Clash Meta', 
                desc: 'Для опытных пользователей с гибкой настройкой правил.',
                main: 'Скачать APK', link1: 'https://github.com/MetaCubeX/ClashMetaForAndroid/releases',
                sec: 'F-Droid', link2: 'https://f-droid.org/packages/com.github.metacubex.clash_meta/'
            },
            ios: { 
                title: 'Shadowrocket / Streisand', 
                desc: 'Лучшие клиенты для iOS. Требуют покупки или бесплатный Streisand.',
                main: 'App Store (Shadow)', link1: 'https://apps.apple.com/app/shadowrocket/id932747118',
                sec: 'App Store (Streisand)', link2: 'https://apps.apple.com/app/streisand/id6450534064'
            }
        };

        function setApp(key, el) {
            document.querySelectorAll('.app-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            const app = apps[key];
            document.getElementById('app-details').innerHTML = `
                <div style="font-weight:800; font-size:18px; margin-bottom:10px;">${app.title}</div>
                <div style="font-size:13px; color:var(--text-sub); margin-bottom:20px;">${app.desc}</div>
                <button class="btn-action btn-grey" onclick="window.open('${app.link1}')"><i class="fas fa-download"></i> ${app.main}</button>
                <button class="btn-action btn-grey" onclick="window.open('${app.link2}')">${app.sec}</button>
                <button class="btn-action btn-blue" style="margin-top:20px;" onclick="tg.sendData('add_sub')"><i class="fas fa-plus"></i> Добавить подписку</button>
            `;
        }

        // 3. WHEEL LOGIC
        const lastSpin = parseFloat(params.get('ls')) || 0;
        function updateTimer() {
            const now = Math.floor(Date.now() / 1000);
            const timeLeft = (lastSpin + 518400) - now;
            if (timeLeft > 0) {
                document.getElementById('spin-btn').disabled = true;
                const d = Math.floor(timeLeft / 86400);
                const h = Math.floor((timeLeft % 86400) / 3600);
                document.getElementById('timer-text').innerText = `Доступно через ${d}д ${h}ч`;
            } else {
                document.getElementById('timer-text').innerText = "Можно крутить!";
                document.getElementById('timer-text').style.color = "var(--green)";
            }
        }

        function startSpin() {
            const btn = document.getElementById('spin-btn');
            btn.innerText = "КРУТИМ...";
            setTimeout(() => {
                const rand = Math.random() * 100;
                let prize = "Попробуйте завтра";
                if (rand < 15) prize = "🎁 +10₽ на баланс";
                else if (rand < 30) prize = "📅 +1 день подписки";
                tg.showAlert(prize, () => {
                    tg.sendData(JSON.stringify({action: 'wheel', result: prize}));
                    tg.close();
                });
            }, 1500);
        }

        // INIT
        setApp('v2ray', document.querySelector('.app-tab'));
        initMap();
        updateTimer();
    </script>
</body>
</html>
