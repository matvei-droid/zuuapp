<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zuu VPN Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #161c2d;
            --accent: #38bdf8;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --card-border: rgba(255, 255, 255, 0.05);
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            padding-bottom: 80px; /* место для кнопок внизу */
        }

        /* Статус-карточка */
        .user-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--card-border);
            margin-bottom: 16px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .info-item {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 12px;
        }

        .info-label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; }
        .info-value { font-size: 14px; font-weight: 700; display: block; }

        /* Карта */
        .map-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--card-border);
            margin-bottom: 16px;
        }

        #map {
            height: 180px;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* Селектор платформ */
        .platform-selector {
            display: flex;
            background: var(--card-bg);
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
            margin-bottom: 16px;
        }

        .platform-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-sub);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .platform-btn.active {
            background: var(--accent);
            color: #000;
        }

        /* Карточки приложений */
        .app-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--card-border);
        }

        .app-icon {
            width: 44px;
            height: 44px;
            background: #1e293b;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 20px;
        }

        .app-info { flex: 1; }
        .app-name { font-weight: 600; font-size: 14px; }
        .app-desc { font-size: 11px; color: var(--text-sub); }

        .btn-download {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

        /* Кнопки снизу */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: rgba(11, 15, 26, 0.9);
            backdrop-filter: blur(10px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .nav-btn {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-main { background: var(--accent); color: #000; }
        .btn-sec { background: var(--card-bg); color: #fff; border: 1px solid var(--card-border); }

        .leaflet-container { background: #0b0f1a !important; }
    </style>
</head>
<body>

    <div class="user-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 800; font-size: 18px;">Zuu VPN <span style="color:var(--accent)">Premium</span></span>
            <span id="status" style="color: var(--success); font-size: 12px; font-weight: 600;">● Активен</span>
        </div>
        
        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">ID Аккаунта</span>
                <span class="info-value" id="u-id">...</span>
            </div>
            <div class="info-item">
                <span class="info-label">Баланс</span>
                <span class="info-value" id="u-bal">0 ₽</span>
            </div>
            <div class="info-item">
                <span class="info-label">Подписка до</span>
                <span class="info-value" id="u-exp">--.--.----</span>
            </div>
            <div class="info-item">
                <span class="info-label">Лимит устройств</span>
                <span class="info-value" id="u-dev">1</span>
            </div>
        </div>
    </div>

    <div class="map-card">
        <span class="info-label"><i class="fas fa-globe-americas"></i> География серверов</span>
        <div id="map"></div>
    </div>

    <div class="platform-selector">
        <button class="platform-btn active" onclick="changeTab('android', this)"><i class="fab fa-android"></i> Android</button>
        <button class="platform-btn" onclick="changeTab('ios', this)"><i class="fab fa-apple"></i> iOS</button>
        <button class="platform-btn" onclick="changeTab('pc', this)"><i class="fas fa-desktop"></i> PC</button>
    </div>

    <div id="app-list">
        </div>

    <div class="bottom-nav">
        <button class="nav-btn btn-sec" onclick="tg.close()">Закрыть</button>
        <button class="nav-btn btn-main" onclick="tg.sendData('extend')">Продлить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        document.getElementById('u-id').innerText = params.get('id') || 'Неизвестно';
        document.getElementById('u-bal').innerText = (params.get('bal') || '0') + ' ₽';
        document.getElementById('u-exp').innerText = params.get('exp') || 'Нет';
        document.getElementById('u-dev').innerText = (parseInt(params.get('dev')) + 1) || '1';

        // Данные приложений по вкладкам
        const apps = {
            android: [
                { name: 'Hiddify', desc: 'Рекомендуемый (все в одном)', icon: 'fa-bolt', link: 'https://play.google.com/store/apps/details?id=app.hiddify.com' },
                { name: 'v2rayNG', desc: 'Классический клиент', icon: 'fa-code-branch', link: 'https://play.google.com/store/apps/details?id=com.v2ray.ang' }
            ],
            ios: [
                { name: 'Hiddify', desc: 'Лучший выбор для iPhone', icon: 'fa-apple', link: 'https://apps.apple.com/us/app/hiddify-next/id6477388513' },
                { name: 'Streisand', desc: 'Быстрый и легкий', icon: 'fa-paper-plane', link: 'https://apps.apple.com/us/app/streisand/id6450534064' }
            ],
            pc: [
                { name: 'Hiddify Desktop', desc: 'Для Windows/Mac/Linux', icon: 'fa-laptop', link: 'https://github.com/hiddify/hiddify-next/releases' },
                { name: 'v2rayN', desc: 'Для опытных пользователей', icon: 'fa-desktop', link: 'https://github.com/2dust/v2rayN/releases' }
            ]
        };

        function changeTab(platform, btn) {
            // Кнопки
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Контент
            const list = document.getElementById('app-list');
            list.innerHTML = '';
            apps[platform].forEach(app => {
                list.innerHTML += `
                    <div class="app-card">
                        <div class="app-icon"><i class="fas ${app.icon}"></i></div>
                        <div class="app-info">
                            <div class="app-name">${app.name}</div>
                            <div class="app-desc">${app.desc}</div>
                        </div>
                        <button class="btn-download" onclick="window.open('${app.link}')">Установить</button>
                    </div>
                `;
            });
        }

        // Карта
        function initMap() {
            const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([50, 20], 3);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            const locations = [
                [55.75, 37.61], [52.52, 13.40], [52.36, 4.88], [48.85, 2.35], [40.41, -3.70], [25.20, 55.27]
            ];

            locations.forEach(coord => {
                L.circleMarker(coord, {
                    radius: 5,
                    fillColor: "#38bdf8",
                    color: "#fff",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map);
            });
        }

        // Запуск
        changeTab('android', document.querySelector('.platform-btn'));
        setTimeout(initMap, 500);
    </script>
</body>
</html>
