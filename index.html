<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zuu VPN Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Используем переменные из твоего дизайна */
        :root {
            --bg-color: #f5f0e5;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #8e8e93;
            --accent: #3b82f6;
            --success: #10b981;
            --tab-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0 16px 100px 16px;
        }

        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .btn { background: var(--accent); color: white; border: none; border-radius: 16px; padding: 16px; font-weight: 700; width: 100%; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 20px; left: 16px; right: 16px; background: var(--tab-bg); backdrop-filter: blur(20px); border-radius: 28px; display: flex; justify-content: space-around; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); text-decoration: none; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .promo-input { background: #f9fafb; border: 1px solid #f3f4f6; padding: 14px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="header">
            <div>
                <p style="margin:0; color: var(--text-sub);">Привет,</p>
                <h1 id="user-name" style="margin:0; font-size: 24px;">Пользователь</h1>
            </div>
            <div class="badge" id="user-status" style="background:#dbeafe; color:var(--accent); padding:4px 12px; border-radius:100px; font-size:12px;">Загрузка...</div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="font-weight:700">Трафик (30 дней)</span>
                <span id="traffic-usage" style="color:var(--text-sub)">0 GB</span>
            </div>
            <div style="height:8px; background:#f0f0f0; border-radius:10px;">
                <div id="traffic-bar" style="width:0%; height:100%; background:var(--accent); border-radius:10px;"></div>
            </div>
        </div>

        <div class="card" style="border: 1px dashed var(--accent); background: #eff6ff;">
            <button class="btn" onclick="importToHapp()">
                <i class="fas fa-file-import"></i> Импорт в Happ Proxy
            </button>
        </div>
    </div>

    <div id="balance" class="page">
        <h1 style="margin-top:20px;">Мой счет</h1>
        <div class="card" style="text-align:center;">
            <div style="font-size:32px; font-weight:900;" id="display-balance">0.00 ₽</div>
        </div>
        <div class="card">
            <input type="number" id="recharge-amount" class="promo-input" placeholder="Сумма пополнения">
            <button class="btn" onclick="topUp()">Пополнить баланс</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-home"></i>Главная</a>
        <a href="#" class="nav-item" onclick="showPage('balance', this)"><i class="fas fa-wallet"></i>Баланс</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ПОЛУЧЕНИЕ ДАННЫХ ИЗ URL (которые передал api.py)
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');
        const userHash = params.get('hash'); // Для безопасности запросов

        // Инициализация данных
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "Друг";
        document.getElementById('display-balance').innerText = (params.get('bal') || '0') + ' ₽';
        
        const trafficUsed = parseFloat(params.get('traffic') || 0);
        const trafficLimit = 50; // Например, 50ГБ лимит
        document.getElementById('traffic-usage').innerText = `${trafficUsed.toFixed(2)} GB / ${trafficLimit} GB`;
        document.getElementById('traffic-bar').style.width = Math.min((trafficUsed / trafficLimit) * 100, 100) + '%';

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        // 2. ЛОГИКА ИМПОРТА (используем enc_link из твоего бота)
        function importToHapp() {
            const encLink = params.get('enc_link');
            if (!encLink) {
                tg.showAlert("У вас нет активных подписок для импорта.");
                return;
            }
            tg.HapticFeedback.notificationOccurred('success');
            tg.openLink(`happ://add/${encLink}`);
        }

        // 3. ЛОГИКА ПОПОЛНЕНИЯ (Взаимодействие с ботом)
        function topUp() {
            const amount = document.getElementById('recharge-amount').value;
            if (amount < 50) {
                tg.showAlert("Минимальная сумма — 50₽");
                return;
            }
            
            // Отправляем данные боту, чтобы он создал платеж
            tg.sendData(JSON.stringify({
                action: 'top_up',
                amount: amount
            }));
            tg.close(); // Закрываем веб-апп, чтобы юзер увидел счет в боте
        }

        // Авто-настройка темы под Telegram
        tg.setHeaderColor(tg.colorScheme === 'dark' ? '#1a1a1a' : '#f5f0e5');
    </script>
</body>
</html>
